<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pennymac · Android components</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { margin: 0; padding: 48px; background: var(--pm-slate-100); font-family: var(--pm-font-sans); }
  .page { max-width: 1520px; margin: 0 auto; }
  h1 { font-family: var(--pm-font-display); font-size: 40px; line-height: 48px; font-weight: 800; letter-spacing: -0.015em; margin: 0 0 4px; }
  .sub { color: var(--pm-text-secondary); margin: 0 0 40px; font-size: 15px; }
  .shelf { display: grid; grid-template-columns: repeat(3, auto); gap: 32px; justify-content: start; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 40px; }
  .caption {
    font-family: var(--pm-font-display);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--pm-text-tertiary); font-weight: 700; margin-bottom: 12px;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../android-frame.jsx"></script>
<script type="text/babel" src="./android-components.jsx"></script>
</head>
<body>
<div class="page">
  <h1>Android components</h1>
  <p class="sub">Material 3 patterns (filled/tonal/outlined buttons, outlined text fields, M3 switch, chips) recolored to the Pennymac palette. Montserrat for display, Roboto for body.</p>
  <div id="root"></div>
</div>
<script type="text/babel">
  const { AndroidDevice } = window;

  function LoanHome() {
    return (
      <div style={{ background: PMA.slate50, minHeight: '100%', paddingBottom: 80, position: 'relative' }}>
        <PMABanner tone="warning" title="Your rate lock expires May 3" body="Submit 2 remaining documents before Friday to close on time." cta="Upload now" />
        <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 16 }}>
          <PMAPaymentCard />
          <div style={{ background: PMA.white, borderRadius: 12, overflow: 'hidden', boxShadow: '0 1px 2px rgba(0,0,0,0.06)' }}>
            <PMAListItem leading="JL" headline="Loan #2048 · 30-yr fixed" supporting="Balance $318,402" trailing={<span style={{ fontFamily: AFONT.body, fontSize: 14, color: PMA.slate500 }}>6.125%</span>} />
            <PMAListItem leading="📄" headline="Documents" supporting="2 need attention" trailing={
              <div style={{ height: 24, padding: '0 8px', borderRadius: 8, background: PMA.error100, color: PMA.error700, display: 'flex', alignItems: 'center', fontSize: 12, fontWeight: 600, fontFamily: AFONT.body }}>Action</div>
            } />
            <PMAListItem leading="💬" headline="Message your loan officer" supporting="Avg reply in 2 hours" noDivider />
          </div>
        </div>
        <PMAFab label="Make a payment" />
      </div>
    );
  }

  function ApplyForm() {
    return (
      <div style={{ background: PMA.slate50, minHeight: '100%', padding: 16, display: 'flex', flexDirection: 'column', gap: 20 }}>
        <PMAField label="Legal first name" value="Jordan" supporting="As it appears on your government ID." />
        <PMAField label="Annual household income" value="142,000" prefix="$" focused />
        <PMAField label="Property ZIP code" value="0012" error="Enter a valid 5-digit ZIP code." />
        <div style={{ background: PMA.white, borderRadius: 12, boxShadow: '0 1px 2px rgba(0,0,0,0.06)', overflow: 'hidden' }}>
          <div style={{ padding: '16px 16px 8px', fontSize: 12, fontWeight: 500, letterSpacing: '0.5px', color: PMA.slate500, textTransform: 'uppercase', fontFamily: AFONT.body }}>Property use</div>
          <PMARadio checked label="Primary residence" meta="You'll live in this home most of the year." />
          <PMARadio label="Second home" meta="Vacation or occasional use." />
          <PMARadio label="Investment property" meta="Rented out or held as an investment." />
        </div>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 4 }}>
          <PMAButton label="Save" variant="text" />
          <PMAButton label="Continue" />
        </div>
      </div>
    );
  }

  function RateShopping() {
    return (
      <div style={{ background: PMA.slate50, minHeight: '100%', paddingBottom: 20 }}>
        <div style={{ padding: '12px 16px', display: 'flex', gap: 8, flexWrap: 'wrap', background: PMA.slate50 }}>
          <PMAChip label="30-yr fixed" selected />
          <PMAChip label="15-yr fixed" />
          <PMAChip label="ARM" />
          <PMAChip label="FHA" />
        </div>
        <div style={{ padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 16 }}>
          <PMARateCard />
          <div style={{ background: PMA.white, borderRadius: 12, overflow: 'hidden', boxShadow: '0 1px 2px rgba(0,0,0,0.06)' }}>
            <PMAListItem headline="15-year fixed" supporting="5.625% APR · $2,311/mo" trailing={
              <div style={{ height: 24, padding: '0 8px', borderRadius: 8, background: PMA.success100, color: PMA.success700, display: 'flex', alignItems: 'center', fontSize: 12, fontWeight: 600, fontFamily: AFONT.body }}>Lowest</div>
            } />
            <PMAListItem headline="7/6 ARM" supporting="5.875% APR · $1,678/mo" />
            <PMAListItem headline="FHA 30-year" supporting="6.250% APR · $1,874/mo" noDivider />
          </div>
          <div style={{ background: PMA.white, borderRadius: 12, padding: 16, boxShadow: '0 1px 2px rgba(0,0,0,0.06)' }}>
            <div style={{ fontFamily: AFONT.display, fontSize: 16, fontWeight: 700, color: PMA.slate950 }}>Alerts</div>
            {[['Rate drop alerts', true], ['Weekly market update', false]].map(([label, on]) => (
              <div key={label} style={{ display: 'flex', alignItems: 'center', padding: '12px 0', borderTop: `1px solid ${PMA.slate200}` }}>
                <div style={{ flex: 1, fontSize: 15, color: PMA.slate950, fontFamily: AFONT.body }}>{label}</div>
                <PMASwitch on={on} />
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  function App() {
    return (
      <div className="stack">
        <div className="shelf">
          <div>
            <div className="caption">Loan home · FAB + banner</div>
            <AndroidDevice title="My loan" width={380} height={780}>
              <LoanHome />
            </AndroidDevice>
          </div>
          <div>
            <div className="caption">Application · M3 fields</div>
            <AndroidDevice title="Apply" width={380} height={780}>
              <ApplyForm />
            </AndroidDevice>
          </div>
          <div>
            <div className="caption">Rate shopping · chips</div>
            <AndroidDevice title="Rates" width={380} height={780}>
              <RateShopping />
            </AndroidDevice>
          </div>
        </div>

        <div>
          <div className="caption">Components in isolation</div>
          <div style={{ background: PMA.white, borderRadius: 12, padding: 32, display: 'flex', flexWrap: 'wrap', gap: 16, alignItems: 'center', boxShadow: '0 1px 2px rgba(0,0,0,0.06)' }}>
            <PMAButton label="Continue" />
            <PMAButton label="Tonal action" variant="tonal" />
            <PMAButton label="Save" variant="outlined" />
            <PMAButton label="View details" variant="text" />
            <PMAButton label="Small" size="sm" />
            <PMAButton label="Large" size="lg" />
            <PMAChip label="30-yr fixed" selected />
            <PMAChip label="15-yr" />
            <PMAChip label="ARM" />
            <PMASwitch on />
            <PMASwitch on={false} />
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
